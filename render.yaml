# Render Blueprint — DevSentinel API (free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# After connecting the repo in Render, this provisions the FastAPI backend.
# Set every env var below (sync: false) in the Render dashboard.
# Keep the service warm with a cron-job.org ping to /health every ~10 min so the
# free instance does not sleep and the in-process weekly-report scheduler fires.
services:
  - type: web
    name: devsentinel-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Supabase session pooler URL (port 5432), with +asyncpg driver
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      # Paste the full PEM contents (Render has no file system path for the key)
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Upstash Redis connection string (rediss://...)
      - key: REDIS_URL
        sync: false
      # Comma-separated allowed origins, e.g. https://your-app.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Public frontend URL used in notification emails
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
